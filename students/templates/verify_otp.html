<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - Buny Academy</title>

    <style>

        body{
            margin:0;
            padding:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#020617;
            font-family:Arial, sans-serif;
        }

        .box{
            width:400px;
            padding:40px;
            background:rgba(255,255,255,0.08);
            border-radius:20px;
            text-align:center;
            color:white;
            box-shadow:0 0 25px rgba(37,99,235,0.4);
        }

        h1{
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:15px;
            border:none;
            border-radius:12px;
            margin-top:20px;
            background:#0f172a;
            color:white;
            font-size:16px;
        }

        button{
            margin-top:25px;
            width:100%;
            padding:15px;
            border:none;
            border-radius:12px;
            background:linear-gradient(to right,#06b6d4,#2563eb,#7c3aed);
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        .error{
            color:red;
            margin-top:15px;
        }

    </style>

</head>
<body>

    <div class="box">

        <h1>OTP Verification</h1>

        <p>Enter the OTP sent to your email</p>

        <form method="POST">

            {% csrf_token %}

            <input type="text" name="otp" placeholder="Enter OTP">

            <button type="submit">
                VERIFY OTP
            </button>

        </form>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

    </div>

</body>
</html>
